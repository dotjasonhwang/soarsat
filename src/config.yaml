# ╔════════════════════════════════════════════════════════════════════════════╗
# ║  CLIENT CONFIGURATION                                                       ║
# ║  This is the main file to edit for each new client.                         ║
# ║  For brand colors, see: src/assets/styles/tailwind.css                      ║
# ╚════════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
# BUSINESS INFO (update all of these)
# ─────────────────────────────────────────────────────────────────────────────
business:
  name: 'Soar SAT'
  email: 'hello@aspirecodingacademy.com'
  phone:
    tel: '8329009422' # Numbers only, used for tel: links
    formatted: '(832) 900-9422' # Display format
  location:
    address: '800 W Sam Houston Pkwy S #130, Houston, TX 77042'
    placeId: 'ChIJ16hEM4vDQIYRawe7R6bhE5c' # Optional: Google Maps Place ID for embedded map
  socialMedia:
    twitter: ''
    instagram: ''
    facebook: ''
    linkedin: ''
    github: '' # Leave blank if not applicable

# ─────────────────────────────────────────────────────────────────────────────
# SITE SETTINGS (update these)
# ─────────────────────────────────────────────────────────────────────────────
site:
  name: 'Soar SAT' # Should match business.name
  site: 'https://soarsat.com' # Production URL
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: '' # Optional: Google Search Console verification

# ─────────────────────────────────────────────────────────────────────────────
# SCHEMA MARKUP (JSON-LD for rich search results)
# ─────────────────────────────────────────────────────────────────────────────
schema:
  type: 'LocalBusiness' # Options: "LocalBusiness" | "Organization" | "Person" | null (disabled)
  # For LocalBusiness subtypes, use: "Restaurant", "MedicalBusiness", "LegalService", etc.
  # Full list: https://schema.org/LocalBusiness#subtypes

# ─────────────────────────────────────────────────────────────────────────────
# SEO METADATA (update these)
# ─────────────────────────────────────────────────────────────────────────────
metadata:
  title:
    default: 'Soar SAT'
    template: '%s — Soar SAT'
  description: 'A brief description of your business for search engines (150-160 chars ideal)'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: 'Soar SAT'
    images:
      - url: '~/assets/images/default.png' # Replace with your OG image (1200x628)
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL SETTINGS (usually fine as-is)
# ─────────────────────────────────────────────────────────────────────────────
analytics:
  vendors:
    googleTagManager:
      id: null # Add your GTM container ID: "GTM-XXXXXXX"

ui:
  theme: 'system' # Options: "system" | "light" | "dark" | "light:only" | "dark:only"

apps:
  blog:
    isEnabled: false
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true
    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
    isRelatedPostsEnabled: true
    relatedPostsCount: 4
